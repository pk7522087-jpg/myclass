        /* 基礎樣式初始化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19; /* 預設演唱會暗燈模式底色 */

        .glass-nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); }
        
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #d946ef 100%); color: white; box-shadow: 0 10px 20px -5px rgba(217, 70, 239, 0.5); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); border: none; }
        .btn-primary:active:not(:disabled) { transform: scale(0.95); box-shadow: 0 5px 10px -5px rgba(217, 70, 239, 0.5); transition: all 0.1s ease; }
        .btn-primary:disabled { background: #cbd5e1; box-shadow: none; color: #64748b; cursor: not-allowed; }
        
        @keyframes stage-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-stage-spin { animation: stage-spin 10s linear infinite; }
        .animate-stage-spin-fast { animation: stage-spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .animate-spin-reverse { animation: spin-reverse 12s linear infinite; }
        .animate-spin-reverse-fast { animation: spin-reverse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes stage-pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.8; box-shadow: 0 0 40px rgba(217, 70, 239, 0.6); } }
        .animate-stage-pulse { animation: stage-pulse 2s ease-in-out infinite; }
        @keyframes screen-shake { 0%, 100% { transform: translate(0, 0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-4px, -2px) rotate(-1deg); } 20%, 40%, 60%, 80% { transform: translate(4px, 2px) rotate(1deg); } }
        .animate-screen-shake { animation: screen-shake 0.3s ease-in-out infinite; }
        
        /* 優雅的保底能量呼吸聚能特效 */
        @keyframes pity-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(217, 70, 239, 0.4); border-color: rgba(217, 70, 239, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(217, 70, 239, 0.85); border-color: rgba(217, 70, 239, 1); transform: scale(1.02); }
        }
        .animate-pity-pulse { animation: pity-pulse 1.5s ease-in-out infinite; }

        /* 傳說卡炫金流光背景動畫 */
        .legendary-card-glow { position: relative; overflow: hidden; border-color: #fbbf24; }
        .legendary-card-glow::before { 
            content: ''; 
            position: absolute; 
            top: -50%; 
            left: -50%; 
            width: 200%; 
            height: 200%; 
            background: linear-gradient( 45deg, transparent 0%, rgba(218, 165, 32, 0.1) 30%, rgba(255, 255, 255, 0.8) 50%, rgba(218, 165, 32, 0.1) 70%, transparent 100% ); 
            transform: rotate(30deg); 
            animation: holo-sweep 4s infinite linear; 
            z-index: 25; 
            pointer-events: none; 
            will-change: transform;
        }
        
        @keyframes holo-sweep { 0% { transform: translateX(-100%) translateY(-100%) rotate(30deg); } 100% { transform: translateX(100%) translateY(100%) rotate(30deg); } }
        @keyframes slash { 0% { transform: translateY(-1500px) rotate(-45deg); opacity: 0; } 10% { transform: translateY(0) rotate(-45deg); opacity: 1; } 20% { transform: translateY(1500px) rotate(-45deg); opacity: 0; } 100% { transform: translateY(1500px) rotate(-45deg); opacity: 0; } }
        .animate-slash { animation: slash 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes slide-in { 0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; } 20% { transform: translateX(0) skewX(-15deg); opacity: 1; } 80% { transform: translateX(0) skewX(-15deg); opacity: 1; filter: brightness(1.5); } 100% { transform: translateX(100%) skewX(-15deg); opacity: 0; } }
        .animate-slide-in { animation: slide-in 2.5s ease-out forwards; }
        @keyframes float-up { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-float-up { animation: float-up 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }
        .animate-breathe { animation: breathe 2s ease-in-out infinite; }
        
        .ig-story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 3px; border-radius: 50%; }
        @keyframes bounce-in { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes eq-bounce { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .eq-bar { width: 4px; background: #6366f1; border-radius: 2px; animation: eq-bounce 1s infinite; }
        .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .eq-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes particle-burst { 0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 5px currentColor); } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; filter: drop-shadow(0 0 15px currentColor); } }
        
        /* 廣播跑馬燈動畫 */
        @keyframes marquee-scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee-scroll {
            display: inline-block;
            animation: marquee-scroll 15s linear infinite;
        }

        /* 盲盒黑影遮罩 */
        .silhouette-mask {
            filter: brightness(0) contrast(0) drop-shadow(0 0 15px rgba(255,255,255,0.8));
            transition: all 0.3s ease;
        }
        
        /* 圖鑑未解鎖黑影 */
        .locked-card-mask {
            filter: brightness(0.2) grayscale(1);
            opacity: 0.8;
        }
        .locked-card-icon {
            filter: brightness(0) invert(0.1);
        }

        /* 3D 視差傾斜與極致像素防模糊指令 */
        .tilt-container {
            perspective: 1000px;
        }
        .tilt-card-body {
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateZ(0); /* translateZ(0) 啟用強制硬體對齊 */
            --rx: 0deg;
            --ry: 0deg;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            -webkit-font-smoothing: subpixel-antialiased; /* 優化 subpixel 抗鋸齒文字，不因傾斜變模糊 */
            filter: blur(0px); /* 阻止 GPU 重繪時的盲目像素模糊 */
            -webkit-filter: blur(0px);
        }
        .holo-overlay {
            position: absolute;
            inset: 0;
            z-index: 25;
            pointer-events: none;
            mix-blend-mode: color-dodge;
            opacity: 0;
            background: linear-gradient(var(--angle, 135deg), rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 45%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.25) 55%, rgba(255,255,255,0) 100%);
            transition: opacity 0.2s ease;
        }
        .tilt-card-body:hover .holo-overlay {
            opacity: 1;
        }

        /* 五連抽特寫放大 (自適應無重疊單排水平Carousel排版) */
        .card-best-highlight {
            transform: scale(1.05);
            z-index: 40;
            box-shadow: 0 0 35px rgba(251, 191, 36, 0.7);
            border-color: #fbbf24 !important;
            animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .card-normal-dim {
            transform: scale(0.95);
            opacity: 0.95;
            transition: all 0.3s ease;
        }
        .card-normal-dim:hover {
            transform: scale(1);
            opacity: 1;
            z-index: 30;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 10px; }

        .concert-mode .bg-white { background-color: #0f172a; border-color: #334155; }

        .concert-mode .border-slate-200, .concert-mode .border-slate-300 { border-color: #475569; }
        .concert-mode .border-slate-100 { border-color: #1e293b; }
    </style>

        function App() {
          // ================= 1. 置頂 States 與 數據 setters =================

          const customCards = systemData.customCards;
          const deletedCardIds = systemData.deletedCardIds;
          const pityCount = systemData.pityCount;

          const updateSystemData = useCallback((updater) => {
              setSystemData(prev => {
                  const updated = typeof updater === 'function' ? updater(prev) : { ...prev, ...updater };
                  try {
                      localStorage.setItem('class_management_system_data_v2', JSON.stringify(updated));

                      console.error("LocalStorage儲存失敗", e);

          }, []);

          const setHistory = useCallback((val) => {

          const setGroupConfig = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, groupConfig: typeof val === 'function' ? val(prev.groupConfig) : val }));
          }, [updateSystemData]);

          const setRecycleProgress = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, recycleProgress: typeof val === 'function' ? val(prev.recycleProgress) : val }));
          }, [updateSystemData]);

          const setDecomposeStats = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, decomposeStats: typeof val === 'function' ? val(prev.decomposeStats) : val }));
          }, [updateSystemData]);

          const setCustomCards = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, customCards: typeof val === 'function' ? val(prev.customCards) : val }));
          }, [updateSystemData]);

          const setDeletedCardIds = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, deletedCardIds: typeof val === 'function' ? val(prev.deletedCardIds) : val }));
          }, [updateSystemData]);

          const setPityCount = useCallback((val) => {
              updateSystemData(prev => ({ ...prev, pityCount: typeof val === 'function' ? val(prev.pityCount) : val }));
          }, [updateSystemData]);

          // ================= 2. 視圖及 UI Modals 控制狀態 =================
          const [currentView, setCurrentView] = useState('home'); 
          const [historyMode, setHistoryMode] = useState('time'); 
          const [showClearConfirm, setShowClearConfirm] = useState(false); 
          const [teacherFilter, setTeacherFilter] = useState('全部');

          const [sacrificeData, setSacrificeData] = useState({ cards: [], orbs: 0, student: '', rarity: '' });
          const [cardToDelete, setCardToDelete] = useState(null); 
          const [selectedRedeemStudent, setSelectedRedeemStudent] = useState(null);
          const [newCardForm, setNewCardForm] = useState({ name: '', rarity: '普通', type: '特權', effect: '', icon: '✨' });

          // ================= 3. 音效元件 Refs =================
          const bgmLoFiRef = useRef(null);
          const bgmEDMRef = useRef(null);
          const sfxDrawRef = useRef(null);
          const sfxRevealRef = useRef(null);
          const sfxLegendaryRef = useRef(null);
          const sfxHeartbeatRef = useRef(null);
          const sfxClickRef = useRef(null); 
          const sfxFailRef = useRef(null); 
          const sfxCoinRef = useRef(null); 
          const synthBgmRef = useRef({ interval: null, ctx: null });

          // ================= 4. 抽卡核心流程 States =================
          const [drawState, setDrawState] = useState('idle'); 
          const [drawnCards, setDrawnCards] = useState([]); 
          const [studentName, setStudentName] = useState(''); 
          const [reforgeState, setReforgeState] = useState('idle'); 
          const [reforgeResultData, setReforgeResultData] = useState(null);

          // ================= 5. Audio Context Engine & Basic Sounds =================
          const getAudioCtx = useCallback(() => {
            try {
              const AudioContextClass = window.AudioContext || window.webkitAudioContext;
              if (!AudioContextClass) return null;
              if (!synthBgmRef.current.ctx) {
                synthBgmRef.current.ctx = new AudioContextClass();
              }
              if (synthBgmRef.current.ctx.state === 'suspended') {
                synthBgmRef.current.ctx.resume();
              }
              return synthBgmRef.current.ctx;
            } catch(e) {
              console.warn("Could not init audio context", e);
              return null;
            }
          }, []);

          // 宣告 Web Audio 合成器音效函數
          const synthSound = useCallback((type) => {
            try {
              const audioCtx = getAudioCtx();
              if (!audioCtx) return;
              
              if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
              } else if (type === 'coin') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
              } else if (type === 'draw') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
              } else if (type === 'reveal') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
              } else if (type === 'legendary') {
                const now = audioCtx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, i) => {
                  const o = audioCtx.createOscillator();
                  const g = audioCtx.createGain();
                  o.connect(g); g.connect(audioCtx.destination);
                  o.frequency.value = freq;
                  o.type = 'sine';
                  g.gain.setValueAtTime(0, now);
                  g.gain.linearRampToValueAtTime(0.1, now + i * 0.08);
                  g.gain.linearRampToValueAtTime(0.001, now + 0.8);
                  o.start(now + i * 0.08);
                  o.stop(now + 0.8);
                });
              } else if (type === 'heartbeat') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(75, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';

                  [110.00, 130.81, 164.81, 196.00], // Am7

                         <div className="flex flex-col md:flex-row gap-8 md:gap-16 mb-12">
                            <div className="transform scale-110 md:scale-125"><CardUI card={reforgeResultData.card} /></div>
                            <div className="transform scale-110 md:scale-125"><CardUI card={reforgeResultData.card2} /></div>
                         </div>
                      ) : (
                         <div className="transform scale-110 md:scale-125 mb-12"><CardUI card={reforgeResultData.card} /></div>
                      )}
                      
                      <button onClick={closeResult} className="btn-primary px-12 py-5 rounded-full text-2xl font-black flex items-center gap-3 shadow-[0_0_20px_rgba(217,70,239,0.5)]">
                        <CheckCircle className="w-8 h-8" /> 收入珍藏冊
                      </button>
                    </div>
                  </div>
                )}

                {/* 班級與編隊設定工坊 */}
                {currentView === 'settings' && (
                  <div className="max-w-6xl mx-auto animate-in fade-in zoom-in duration-300">
                    <div className="glass-panel rounded-3xl p-6 md:p-8 border border-white/10 mb-8">
                      <div className="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-slate-800 gap-6">
                        <h2 className="text-3xl font-black text-slate-100 flex items-center gap-3"><Settings className="w-8 h-8 text-indigo-400" /> 隊伍編制</h2>
                        <div className="bg-slate-50 text-slate-400 px-4 py-2 rounded-xl font-bold border border-slate-700 text-sm">
                          點擊玩家按鈕快速切換所屬小組 (1~5組)
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">
                        {[1, 2, 3, 4, 5].map(groupNum => {
                          const studentsInGroup = Object.entries(groupConfig).filter(([s, g]) => g === groupNum).map(([s, _]) => s).sort(compareStudents);
                          const groupColors = {
                            1: 'bg-rose-955/20 border-rose-900/40 text-rose-300', 2: 'bg-blue-955/20 border-blue-900/40 text-blue-300',
                            3: 'bg-emerald-955/20 border-emerald-900/40 text-emerald-300', 4: 'bg-amber-100 border-amber-300 text-amber-800 shadow-inner',
                            5: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800 shadow-inner'
                          };
                          return (
                            <div key={groupNum} className={`border rounded-2xl p-4 shadow-sm ${groupColors[groupNum]}`}>
                              <h3 className="text-lg font-black border-b border-current/20 pb-2 mb-3">第 {groupNum} 組</h3>
                              <div className="flex flex-wrap gap-2">
                                {studentsInGroup.length > 0 ? studentsInGroup.map(s => (
                                  <span key={s} className="bg-slate-900 font-bold text-xs shadow-sm border border-slate-800 px-2.5 py-1 rounded">{s}</span>
                                )) : <span className="text-xs opacity-60 font-bold">尚未指派</span>}
                              </div>
                            </div>
                          )
                        })}
                      </div>

                      <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 shadow-inner">
                        <h3 className="text-xl font-black text-slate-200 mb-4">全部玩家名單</h3>
                        <div className="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3">
                          {Array.from(new Set([...Array.from({ length: 30 }, (_, i) => `${i + 1}號`), ...history.map(h => h.student).filter(Boolean)])).sort(compareStudents).map(student => {
                            const groupNum = groupConfig[student] || 0;
                            const btnColors = {
                              0: 'bg-slate-900 border-slate-800 text-slate-400 hover:bg-slate-850',
                              1: 'bg-rose-955/40 border-rose-900 text-rose-300 shadow-inner',
                              2: 'bg-blue-955/40 border-blue-900 text-blue-300 shadow-inner',
                              3: 'bg-emerald-955/40 border-emerald-300 text-emerald-300 shadow-inner',
                              4: 'bg-amber-100 border-amber-300 text-amber-800 shadow-inner',
                              5: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800 shadow-inner'
                            };
                            const handleCycle = () => { playClickSfx(); setGroupConfig(prev => {
                                const nextConfig = { ...prev };
                                nextConfig[student] = prev[student] === 5 ? 0 : (prev[student] || 0) + 1;
                                return nextConfig;
                            }); };
                            return (
                              <button key={student} onClick={handleCycle} className={`flex flex-col items-center justify-center p-2 rounded-xl border transition-all active:scale-95 ${btnColors[groupNum]}`}>
                                <span className="font-black text-sm md:text-base truncate w-full">{student}</span>
                                <span className="text-[10px] font-bold mt-0.5 opacity-75">{groupNum === 0 ? '未分組' : `第 ${groupNum} 組`}</span>
                              </button>
                            )
                          })}
                        </div>
                      </div>
                    </div>

                    {/* 新增：自訂卡牌工坊 */}
                    <div className="glass-panel rounded-3xl p-6 md:p-8 border border-white/10 mt-8">
                      <div className="flex flex-col md:flex-row justify-between items-center mb-6 pb-6 border-b border-slate-800 gap-6">
                        <h2 className="text-3xl font-black text-slate-100 flex items-center gap-3"><PlusCircle className="w-8 h-8 text-fuchsia-500 animate-pulse" /> 自訂卡牌工坊</h2>
                        <div className="bg-fuchsia-955/50 text-fuchsia-400 px-4 py-2 rounded-xl font-bold border border-fuchsia-900/50 text-sm">
                          建立節慶 or 期間限定的專屬卡牌！
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                          <h4 className="font-bold text-slate-200 mb-4 flex items-center gap-2"><Sparkles className="w-5 h-5 text-indigo-500 animate-pulse" /> 創造新卡牌</h4>
                          <div className="space-y-4">
                             <input type="text" placeholder="卡牌名稱 (如: 萬聖節不給糖就搗蛋)" value={newCardForm.name} onChange={e=>setNewCardForm({...newCardForm, name: e.target.value})} className="w-full p-3 bg-slate-950 border-2 border-slate-800 text-slate-100 rounded-xl focus:border-indigo-500 focus:outline-none placeholder-slate-500" />
                             <input type="text" placeholder="效果說明 (如: 指定一人請你吃糖)" value={newCardForm.effect} onChange={e=>setNewCardForm({...newCardForm, effect: e.target.value})} className="w-full p-3 bg-slate-955 bg-slate-950 border-2 border-slate-800 text-slate-100 rounded-xl focus:border-indigo-500 focus:outline-none placeholder-slate-500" />
                             <div className="flex gap-3">
                                 <input type="text" placeholder="Emoji 圖示 (如: 🎃)" value={newCardForm.icon} onChange={e=>setNewCardForm({...newCardForm, icon: e.target.value})} className="w-1/3 p-3 bg-slate-950 border-2 border-slate-800 text-slate-100 rounded-xl focus:border-indigo-400 focus:outline-none text-center text-xl placeholder-slate-550" />
                                 <select value={newCardForm.rarity} onChange={e=>setNewCardForm({...newCardForm, rarity: e.target.value})} className="w-1/3 p-3 bg-slate-955 bg-slate-950 text-slate-100 border-2 border-slate-800 rounded-xl focus:border-indigo-500 focus:outline-none font-bold">
                                     <option className="bg-slate-850 text-slate-100" value="普通">普通</option>
                                     <option className="bg-slate-850 text-slate-100" value="稀有">稀有</option>
                                     <option className="bg-slate-850 text-slate-100" value="史詩">史詩</option>
                                     <option className="bg-slate-850 text-slate-100" value="傳說">傳說</option>
                                     <option className="bg-slate-850 text-slate-100" value="神話">神話</option>
                                 </select>
                                 <select value={newCardForm.type} onChange={e=>setNewCardForm({...newCardForm, type: e.target.value})} className="w-1/3 p-3 bg-slate-955 bg-slate-950 text-slate-100 border-2 border-slate-800 rounded-xl focus:border-indigo-400 focus:outline-none font-bold">
                                     <option className="bg-slate-850 text-slate-100" value="特權">特權</option>
                                     <option className="bg-slate-850 text-slate-100" value="獎勵">獎勵</option>
                                     <option className="bg-slate-850 text-slate-100" value="小組">小組</option>
                                     <option className="bg-slate-850 text-slate-100" value="節慶">節慶</option>
                                 </select>
                             </div>
                             <button onClick={handleAddCustomCard} className="w-full btn-primary py-3 rounded-xl font-bold mt-2 flex items-center justify-center gap-2"><PlusCircle className="w-5 h-5"/> 注入魔力並加入卡池</button>
                          </div>
                        </div>
                        
                        <div className="bg-slate-955 bg-slate-950 p-6 rounded-2xl border border-slate-800 h-[22rem] flex flex-col">
                          <h4 className="font-bold text-slate-200 mb-4">目前自訂卡牌清單 ({customCards.length} 張)</h4>
                          <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                             {customCards.length === 0 ? (
                               <div className="text-slate-550 text-center py-10 font-bold border-2 border-dashed border-slate-800 rounded-xl">尚無自訂卡牌</div>
                             ) : (
                               customCards.map(c => (
                                 <div key={c.id} className="flex justify-between items-center bg-slate-900 p-3 rounded-xl border border-slate-855 shadow-sm hover:shadow-md transition-shadow">
                                     <div className="flex items-center gap-3">
                                       <span className="text-2xl">{c.icon}</span>
                                       <div className="flex flex-col">
                                         <span className="font-black text-slate-200">{c.name}</span>
                                         <div className="flex gap-2 mt-1">
                                           <span className={`text-[10px] px-2 py-0.5 rounded text-white ${(RARITY_CONFIG[c.rarity] || RARITY_CONFIG['普通']).tag.split(' text-white')[0]}`}>{c.rarity}</span>
                                           <span className="text-[10px] bg-slate-955 text-slate-400 px-2 py-0.5 rounded border border-slate-850">{c.type}</span>
                                         </div>
                                       </div>
                                     </div>
                                     <button onClick={() => confirmDeleteCard(c.id)} className="text-rose-500 hover:bg-rose-955 p-2 rounded-lg transition-colors border border-transparent hover:border-rose-900/50"><Trash2 className="w-5 h-5"/></button>
                                 </div>
                               ))
                             )}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        // --- 初始化掛載 ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
